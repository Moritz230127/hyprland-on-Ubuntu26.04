# ==========================================================
# 视觉外观：决定你的桌面看起来多帅、多顺滑
# ==========================================================

# --- Nord 配色定义 ---
$nord_bg           = rgb(2e3440) # 深沉的极地蓝黑
$nord_polar_night  = rgb(434c5e) # 像黑夜一样的灰色
$nord_frost_light  = rgb(88c0d0) # 清爽的浅冰蓝色
$nord_frost_dark   = rgb(81a1c1) # 稳重的深冰蓝色

general {
    gaps_in = 4                 # 两个并排窗口之间的间隙
    gaps_out = 10,10,10,10               # 窗口与屏幕边缘的留白（留白更有呼吸感）
    border_size = 2             # 窗口边框的宽度
    col.active_border = $nord_frost_light $nord_frost_dark 45deg # 激活窗口的渐变边框
    col.inactive_border = $nord_polar_night                      # 未激活窗口的普通灰色
    layout = dwindle            # 螺旋切割布局（自动把屏幕分成一块块）
}

decoration {
    rounding = 10               # 窗口的圆角半径，越大越圆润
    blur {
        enabled = true          # 开启窗口背后的毛玻璃模糊效果
        size = 5                # 模糊的强度
        passes = 2              # 模糊的细腻程度（次数越高越平滑）
    }
}

animations {
    enabled = true              # 开启全局动画
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05 # 自定义动画的“Q弹”程度
    animation = windows,     1, 5,  myBezier # 窗口打开/关闭的动画
    animation = windowsOut,  1, 5,  default, popin 80% # 窗口退出时缩小消失
    animation = border,      1, 10, default            # 边框颜色变化的动画
    animation = fade,        1, 5,  default            # 窗口淡入淡出的动画
    animation = workspaces,  1, 5,  default            # 切换桌面时的滑动感
}
