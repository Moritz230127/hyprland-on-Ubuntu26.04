# ==========================================================
# 环境变量设置：解决软件兼容性与输入法问题
# ==========================================================

# --- 输入法相关 (Fcitx5) ---
env = XMODIFIERS, @im=fcitx      # 告诉系统使用 fcitx 框架
env = QT_IM_MODULE, fcitx        # 让使用 QT 引擎的软件支持输入法
env = GTK_IM_MODULE, fcitx       # 让使用 GTK 引擎的软件支持输入法

# --- 屏幕与协议优化 ---
env = NIXOS_OZONE_WL, 1          # 强制基于 Ozone 的软件（如 Chrome）使用 Wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto # 让 Electron 软件自动选择最优协议

# --- NVIDIA 显卡专项加速 (非常重要) ---
env = LIBVA_DRIVER_NAME,nvidia     # 强制使用 NVIDIA 硬件加速视频
env = XDG_SESSION_TYPE,wayland     # 声明当前是 Wayland 会话
env = GBM_BACKEND,nvidia-drm       # 优化 NVIDIA 缓冲区管理（防卡死）
env = __GLX_VENDOR_LIBRARY_NAME,nvidia # 指定 OpenGL 渲染由 NVIDIA 接管
